<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ title() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (description().length) {
      <p>{{ description() }}</p>
    } @else {
      <ng-content />
    }
  </mat-card-content>
  @if (showLink()) {
    <mat-card-footer>
      <a [routerLink]="link()" mat-button>{{ linkText() }}</a>
    </mat-card-footer>
  }
</mat-card>
